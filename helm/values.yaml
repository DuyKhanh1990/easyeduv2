# ============================================================
# values.yaml — Replace placeholders before deploying
# ============================================================

nameOverride: ""
fullnameOverride: ""

# ── Image ───────────────────────────────────────────────────
image:
  repository: REPLACE_WITH_IMAGE   # e.g. harbor.emso.vn/emso-common/new-easyedu
  tag: "0.0.1"
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: harbor-secret

# ── Replicas ────────────────────────────────────────────────
replicaCount: 2

# ── Container port ──────────────────────────────────────────
containerPort: 5000

# ── Service ─────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 5000

# ── Config (non-sensitive env vars) ─────────────────────────
config:
  NODE_ENV: production
  PORT: "5000"
  # Add other non-sensitive config here:
  # S3_REGION: ap-southeast-1
  # S3_BUCKET: my-bucket

# ── Secrets (sensitive env vars) ────────────────────────────
# Values will be base64-encoded automatically by the Secret template
secrets:
  DATABASE_URL: "postgresql://postgres:chiakhoathanhcong@42.96.40.138:5432/easyedu_new"
  SESSION_SECRET: f4ad9c72ad178c7ce4e2a486492f0eacc776a46674d5b2bf5612b0471c929f51
  # SMTP_HOST: REPLACE_WITH_SMTP_HOST
  # SMTP_PORT: "587"
  # SMTP_USER: REPLACE_WITH_SMTP_USER
  # SMTP_PASS: REPLACE_WITH_SMTP_PASS
  # SMTP_FROM: REPLACE_WITH_SMTP_FROM
  # S3_ENDPOINT: REPLACE_WITH_S3_ENDPOINT
  # S3_ACCESS_KEY: REPLACE_WITH_S3_ACCESS_KEY
  # S3_SECRET_KEY: REPLACE_WITH_S3_SECRET_KEY

# ── Liveness & Readiness probes ─────────────────────────────
probes:
  path: /
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

# ── Resources ───────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── Security context (non-root user) ────────────────────────
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false

# ── HorizontalPodAutoscaler ──────────────────────────────────
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Ingress ─────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx         # e.g. nginx, traefik
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: REPLACE_WITH_DOMAIN   # e.g. easyedu.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: easyedu-tls
  #   hosts:
  #     - REPLACE_WITH_DOMAIN

# ── PersistentVolumeClaim (optional storage, e.g. for uploads) ──
persistence:
  enabled: false
  storageClass: ""          # "" = cluster default
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /app/uploads

# ── Node selector / Tolerations / Affinity ──────────────────
nodeSelector: {}
tolerations: []
affinity: {}
