apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "new-easyedu.fullname" . }}
  labels:
    {{- include "new-easyedu.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "new-easyedu.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "new-easyedu.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}

      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "new-easyedu.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP

          # ── Non-sensitive config ────────────────────────────
          envFrom:
            - configMapRef:
                name: {{ include "new-easyedu.fullname" . }}-config

          # ── Sensitive secrets ───────────────────────────────
          env:
            {{- range $key, $_ := .Values.secrets }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "new-easyedu.fullname" $ }}-secret
                  key: {{ $key }}
            {{- end }}

          # ── Liveness probe ──────────────────────────────────
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}

          # ── Readiness probe ─────────────────────────────────
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: 10
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # ── Optional PVC mount ──────────────────────────────
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: app-storage
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}

      # ── Volumes ─────────────────────────────────────────────
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: {{ include "new-easyedu.fullname" . }}-pvc
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
